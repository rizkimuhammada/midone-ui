<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select - Midone UI Vanilla</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body class="p-10">
  <div class="flex flex-col gap-20">
    <div class="grid grid-cols-2">

      <!-- Example 1: Single -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="select-root" class="w-56" data-label="Single" data-placeholder="Select a Framework">
          <div data-component="select-item-group" data-label="Frameworks">
            <div data-component="select-item" data-value="React"></div>
            <div data-component="select-item" data-value="Solid"></div>
            <div data-component="select-item" data-value="Vue"></div>
            <div data-component="select-item" data-value="Svelte"></div>
            <div data-component="select-item" data-value="Vanilla" data-text="Vanilla JS"></div>
          </div>
        </div>
      </div>

      <!-- Example 2: Multiple -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="select-root" class="w-56" data-multiple="true" data-label="Multiple" data-placeholder="Select Frameworks">
          <div data-component="select-item-group" data-label="Frameworks">
            <div data-component="select-item" data-value="React"></div>
            <div data-component="select-item" data-value="Solid"></div>
            <div data-component="select-item" data-value="Vue"></div>
            <div data-component="select-item" data-value="Svelte"></div>
            <div data-component="select-item" data-value="Vanilla" data-text="Vanilla JS"></div>
          </div>
        </div>
      </div>

      <!-- Example 3: Scrollable -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="select-root" class="w-56" data-multiple="true" data-label="Scrollable" data-placeholder="Select a Timezone">
          <div data-component="select-item-group" data-label="North America">
            <div data-component="select-item" data-value="est" data-text="Eastern Standard Time (EST)"></div>
            <div data-component="select-item" data-value="cst" data-text="Central Standard Time (CST)"></div>
            <div data-component="select-item" data-value="mst" data-text="Mountain Standard Time (MST)"></div>
            <div data-component="select-item" data-value="pst" data-text="Pacific Standard Time (PST)"></div>
            <div data-component="select-item" data-value="akst" data-text="Alaska Standard Time (AKST)"></div>
            <div data-component="select-item" data-value="hst" data-text="Hawaii Standard Time (HST)"></div>
          </div>
          <div data-component="select-item-group" data-label="Europe & Africa">
            <div data-component="select-item" data-value="gmt" data-text="Greenwich Mean Time (GMT)"></div>
            <div data-component="select-item" data-value="cet" data-text="Central European Time (CET)"></div>
            <div data-component="select-item" data-value="eet" data-text="Eastern European Time (EET)"></div>
            <div data-component="select-item" data-value="west" data-text="Western European Summer Time (WEST)"></div>
            <div data-component="select-item" data-value="cat" data-text="Central Africa Time (CAT)"></div>
            <div data-component="select-item" data-value="eat" data-text="East Africa Time (EAT)"></div>
          </div>
          <div data-component="select-item-group" data-label="Asia">
            <div data-component="select-item" data-value="msk" data-text="Moscow Time (MSK)"></div>
            <div data-component="select-item" data-value="ist" data-text="India Standard Time (IST)"></div>
            <div data-component="select-item" data-value="jst" data-text="Japan Standard Time (JST)"></div>
            <div data-component="select-item" data-value="kst" data-text="Korea Standard Time (KST)"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
