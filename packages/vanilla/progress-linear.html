<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Linear - Midone UI</title>
</head>

<body class="p-10 bg-background text-foreground">
    <div class="flex flex-col gap-10">
        <h1 class="text-2xl font-bold border-b pb-4">Progress Linear</h1>

        <section class="flex flex-col gap-4 max-w-md">
            <h2 class="text-lg font-semibold">Basic</h2>
            <m-progress-linear-root value="30">
                <m-progress-linear-track>
                    <m-progress-linear-range></m-progress-linear-range>
                </m-progress-linear-track>
            </m-progress-linear-root>
        </section>

        <section class="flex flex-col gap-4 max-w-md">
            <h2 class="text-lg font-semibold">With Label & Value Text</h2>
            <m-progress-linear-root value="65">
                <div class="flex justify-between w-full mb-1">
                    <m-progress-label>System Upload</m-progress-label>
                    <m-progress-value-text></m-progress-value-text>
                </div>
                <m-progress-linear-track>
                    <m-progress-linear-range></m-progress-linear-range>
                </m-progress-linear-track>
            </m-progress-linear-root>
        </section>

        <section class="flex flex-col gap-4 max-w-md">
            <h2 class="text-lg font-semibold">Success Variant (via text-success)</h2>
            <m-progress-linear-root value="100" class="text-success">
                <m-progress-label>Update Complete</m-progress-label>
                <m-progress-linear-track>
                    <m-progress-linear-range></m-progress-linear-range>
                </m-progress-linear-track>
            </m-progress-linear-root>
        </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
