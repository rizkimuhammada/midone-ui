<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carousel - Midone UI Vanilla</title>
</head>

<body class="p-10">
  <div class="flex flex-col gap-20">
    <div class="grid grid-cols-2">

      <!-- Col 1: numbered slides -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div class="carousel-root size-72">
          <div class="carousel-control">
            <button class="carousel-prev-trigger"></button>
            <button class="carousel-next-trigger"></button>
          </div>
          <div class="carousel-indicator-group">
            <button class="carousel-indicator"></button>
            <button class="carousel-indicator"></button>
            <button class="carousel-indicator"></button>
            <button class="carousel-indicator"></button>
            <button class="carousel-indicator"></button>
          </div>
          <div class="carousel-item-group">
            <div class="carousel-item text-5xl font-bold flex items-center justify-center">1</div>
            <div class="carousel-item text-5xl font-bold flex items-center justify-center">2</div>
            <div class="carousel-item text-5xl font-bold flex items-center justify-center">3</div>
            <div class="carousel-item text-5xl font-bold flex items-center justify-center">4</div>
            <div class="carousel-item text-5xl font-bold flex items-center justify-center">5</div>
          </div>
        </div>
      </div>

      <!-- Col 2: image slides -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div class="carousel-root size-72">
          <div class="carousel-control">
            <button class="carousel-prev-trigger"></button>
            <button class="carousel-next-trigger"></button>
          </div>
          <div class="carousel-indicator-group">
            <button class="carousel-indicator"></button>
            <button class="carousel-indicator"></button>
            <button class="carousel-indicator"></button>
            <button class="carousel-indicator"></button>
            <button class="carousel-indicator"></button>
          </div>
          <div class="carousel-item-group">
            <div class="carousel-item"><img src="https://picsum.photos/seed/1/500/300" alt="Slide 0" /></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/2/500/300" alt="Slide 1" /></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/3/500/300" alt="Slide 2" /></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/4/500/300" alt="Slide 3" /></div>
            <div class="carousel-item"><img src="https://picsum.photos/seed/5/500/300" alt="Slide 4" /></div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
