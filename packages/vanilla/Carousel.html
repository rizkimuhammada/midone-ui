<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Midone UI for Vanilla JS - A premium set of native web components built with Tailwind CSS. Highly customizable and easy to integrate." />
    <meta name="keywords" content="midone ui, vanilla js, web components, tailwind css, UI library, premium components" />
    <meta name="author" content="Left4code" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.midone-ui.com/vanilla" />
    <meta property="og:title" content="Midone UI - Vanilla JS Components" />
    <meta property="og:description" content="Midone UI for Vanilla JS - A premium set of native web components built with Tailwind CSS." />
    <meta property="og:image" content="/vite.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.midone-ui.com/vanilla" />
    <meta property="twitter:title" content="Midone UI - Vanilla JS Components" />
    <meta property="twitter:description" content="Midone UI for Vanilla JS - A premium set of native web components built with Tailwind CSS." />
    <meta property="twitter:image" content="/vite.svg" />
  <title>Carousel - Midone UI Vanilla</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div class="flex flex-col gap-20">
    <div class="grid grid-cols-2">

      <!-- Col 1: numbered slides -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="carousel-root" data-show-indicators="true" class=" size-72">
          <div data-component="carousel-control" class="">
            <button data-component="carousel-prev-trigger" class=""></button>
            <button data-component="carousel-next-trigger" class=""></button>
          </div>
          <div data-component="carousel-item-group" class="">
            <div data-component="carousel-item" class=" text-5xl font-bold flex items-center justify-center">1</div>
            <div data-component="carousel-item" class=" text-5xl font-bold flex items-center justify-center">2</div>
            <div data-component="carousel-item" class=" text-5xl font-bold flex items-center justify-center">3</div>
            <div data-component="carousel-item" class=" text-5xl font-bold flex items-center justify-center">4</div>
            <div data-component="carousel-item" class=" text-5xl font-bold flex items-center justify-center">5</div>
          </div>
        </div>
      </div>

      <!-- Col 2: image slides -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="carousel-root" data-show-indicators="true" class=" size-72">
          <div data-component="carousel-control" class="">
            <button data-component="carousel-prev-trigger" class=""></button>
            <button data-component="carousel-next-trigger" class=""></button>
          </div>
          <div data-component="carousel-item-group" class="">
            <div data-component="carousel-item" class=""><img src="https://picsum.photos/seed/1/500/300" alt="Slide 0" /></div>
            <div data-component="carousel-item" class=""><img src="https://picsum.photos/seed/2/500/300" alt="Slide 1" /></div>
            <div data-component="carousel-item" class=""><img src="https://picsum.photos/seed/3/500/300" alt="Slide 2" /></div>
            <div data-component="carousel-item" class=""><img src="https://picsum.photos/seed/4/500/300" alt="Slide 3" /></div>
            <div data-component="carousel-item" class=""><img src="https://picsum.photos/seed/5/500/300" alt="Slide 4" /></div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
