<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badge - Midone UI</title>
</head>

<body class="p-10 bg-background text-foreground">
    <div id="app">
        <div class="p-5 sm:p-20">
            <div class="flex flex-col gap-20">
                <div class="grid grid-cols-2">
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-badge variant="primary">12%</m-badge>
                        <m-badge variant="secondary">12%</m-badge>
                        <m-badge variant="success">12%</m-badge>
                        <m-badge variant="danger">12%</m-badge>
                        <m-badge variant="pending">12%</m-badge>
                        <m-badge variant="warning">12%</m-badge>
                    </div>
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-badge variant="primary">12% <m-icon name="chevron-down" size="14"></m-icon></m-badge>
                        <m-badge variant="secondary">12% <m-icon name="chevron-down" size="14"></m-icon></m-badge>
                        <m-badge variant="success">12% <m-icon name="chevron-down" size="14"></m-icon></m-badge>
                        <m-badge variant="danger">12% <m-icon name="chevron-down" size="14"></m-icon></m-badge>
                        <m-badge variant="pending">12% <m-icon name="chevron-down" size="14"></m-icon></m-badge>
                        <m-badge variant="warning">12% <m-icon name="chevron-down" size="14"></m-icon></m-badge>
                    </div>
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-badge look="outline" variant="primary">12%</m-badge>
                        <m-badge look="outline" variant="secondary">12%</m-badge>
                        <m-badge look="outline" variant="success">12%</m-badge>
                        <m-badge look="outline" variant="danger">12%</m-badge>
                        <m-badge look="outline" variant="pending">12%</m-badge>
                        <m-badge look="outline" variant="warning">12%</m-badge>
                    </div>
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-badge look="outline" variant="primary">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                        <m-badge look="outline" variant="secondary">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                        <m-badge look="outline" variant="success">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                        <m-badge look="outline" variant="danger">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                        <m-badge look="outline" variant="pending">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                        <m-badge look="outline" variant="warning">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                    </div>
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-badge look="filled" variant="primary">12%</m-badge>
                        <m-badge look="filled" variant="secondary">12%</m-badge>
                        <m-badge look="filled" variant="success">12%</m-badge>
                        <m-badge look="filled" variant="danger">12%</m-badge>
                        <m-badge look="filled" variant="pending">12%</m-badge>
                        <m-badge look="filled" variant="warning">12%</m-badge>
                    </div>
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-badge look="filled" variant="primary">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                        <m-badge look="filled" variant="secondary">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                        <m-badge look="filled" variant="success">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                        <m-badge look="filled" variant="danger">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                        <m-badge look="filled" variant="pending">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                        <m-badge look="filled" variant="warning">12% <m-icon name="chevron-down"
                                size="14"></m-icon></m-badge>
                    </div>
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-badge look="outline" variant="primary">
                            <m-icon name="check-square" size="14"></m-icon> 12%
                        </m-badge>
                        <m-badge look="outline" variant="secondary">
                            <m-icon name="check-square" size="14"></m-icon> 12%
                        </m-badge>
                        <m-badge look="outline" variant="success">
                            <m-icon name="check-square" size="14"></m-icon> 12%
                        </m-badge>
                        <m-badge look="outline" variant="danger">
                            <m-icon name="check-square" size="14"></m-icon> 12%
                        </m-badge>
                        <m-badge look="outline" variant="pending">
                            <m-icon name="check-square" size="14"></m-icon> 12%
                        </m-badge>
                        <m-badge look="outline" variant="warning">
                            <m-icon name="check-square" size="14"></m-icon> 12%
                        </m-badge>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
