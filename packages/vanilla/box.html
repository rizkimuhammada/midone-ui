<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box - Midone UI Vanilla</title>
</head>

<body class="p-5 sm:p-20">
    <div id="app">
        <div class="flex flex-col gap-20">
            <div class="grid sm:grid-cols-2">
                <!-- Standard Box -->
                <div
                    class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                    <m-box class="w-70">
                        <m-icon name="circle-gauge" class="size-7 stroke-1 fill-foreground/10"></m-icon>
                        <div class="mt-6 text-2xl font-medium leading-8">$724,091.47</div>
                        <div class="mt-1.5 text-xs uppercase opacity-70">Item Sales</div>
                    </m-box>
                </div>

                <!-- Raised Single Box -->
                <div
                    class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                    <m-box raised="single" class="w-70">
                        <m-icon name="circle-gauge" class="size-7 stroke-1 fill-foreground/10"></m-icon>
                        <div class="mt-6 text-2xl font-medium leading-8">$724,091.47</div>
                        <div class="mt-1.5 text-xs uppercase opacity-70">Item Sales</div>
                    </m-box>
                </div>

                <!-- Raised Double Box -->
                <div
                    class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                    <m-box raised="double" class="w-70">
                        <m-icon name="circle-gauge" class="size-7 stroke-1 fill-foreground/10"></m-icon>
                        <div class="mt-6 text-2xl font-medium leading-8">$724,091.47</div>
                        <div class="mt-1.5 text-xs uppercase opacity-70">Item Sales</div>
                    </m-box>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
