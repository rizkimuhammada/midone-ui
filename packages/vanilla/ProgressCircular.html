<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProgressCircular - Midone UI Vanilla</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="p-10">
  <div data-component="progress-circular-root" data-default-value="42">
    <label data-component="progress-label">Progress Circular</label>
    <svg data-component="progress-circle" class="max-w-48">
      <circle data-component="progress-circle-track"></circle>
      <circle data-component="progress-circle-range"></circle>
    </svg>
    <div data-component="progress-value-text"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
