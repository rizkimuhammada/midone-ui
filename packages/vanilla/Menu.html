<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu - Midone UI Vanilla</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body class="p-10">
  <div class="flex flex-col gap-20">
    <div class="grid grid-cols-2">

      <!-- Col 1: items with icons -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="menu-root" class=" w-56">
          <button data-component="menu-trigger" class="">Open menu</button>
          <div data-component="menu-positioner" class="">
            <div data-component="menu-content" class="">
              <div data-component="menu-item" class="" data-value="react"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4 stroke-[1.5]"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg> React</div>
              <div data-component="menu-item" class="" data-value="solid"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4 stroke-[1.5]"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="15" rx="1"/></svg> Solid</div>
              <div data-component="menu-item" class="" data-value="vue"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4 stroke-[1.5]"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg> Vue</div>
              <div data-component="menu-item" class="" data-value="svelte"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4 stroke-[1.5]"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg> Svelte</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Col 2: items with separator -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="menu-root" class=" w-56">
          <button data-component="menu-trigger" class="">Open menu</button>
          <div data-component="menu-positioner" class="">
            <div data-component="menu-content" class="">
              <div data-component="menu-item" class="" data-value="react">React</div>
              <div data-component="menu-item" class="" data-value="solid">Solid</div>
              <div data-component="menu-item" class="" data-value="vue">Vue</div>
              <div data-component="menu-item" class="" data-value="svelte">Svelte</div>
              <hr data-component="menu-separator" class="" />
              <div data-component="menu-item" class="" data-value="react2">React</div>
              <div data-component="menu-item" class="" data-value="solid2">Solid</div>
              <div data-component="menu-item" class="" data-value="vue2">Vue</div>
              <div data-component="menu-item" class="" data-value="svelte2">Svelte</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Col 3: items with shortcuts + separator -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="menu-root" class=" w-56">
          <button data-component="menu-trigger" class="">Open menu</button>
          <div data-component="menu-positioner" class="">
            <div data-component="menu-content" class="">
              <div data-component="menu-item" class="" data-value="react" data-shortcut="⇧⌘P">React</div>
              <div data-component="menu-item" class="" data-value="solid" data-shortcut="⌘B">Solid</div>
              <div data-component="menu-item" class="" data-value="vue" data-shortcut="⌘S">Vue</div>
              <div data-component="menu-item" class="" data-value="svelte" data-shortcut="⌘K">Svelte</div>
              <hr data-component="menu-separator" class="" />
              <div data-component="menu-item" class="" data-value="react2">React</div>
              <div data-component="menu-item" class="" data-value="solid2">Solid</div>
              <div data-component="menu-item" class="" data-value="vue2">Vue</div>
              <div data-component="menu-item" class="" data-value="svelte2" data-shortcut="⇧⌘Q">Svelte</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Col 4: nested submenu + disabled + shortcuts -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="menu-root" class=" w-56">
          <button data-component="menu-trigger" class="">Open menu</button>
          <div data-component="menu-positioner" class="">
            <div data-component="menu-content" class="">
              <div data-component="menu-item" class="" data-value="react" data-shortcut="⇧⌘P">React</div>
              <div data-component="menu-item" class="" data-value="solid" data-shortcut="⌘B">Solid</div>
              <div data-component="menu-item" class="" data-value="vue" data-shortcut="⌘S">Vue</div>
              <div data-component="menu-item" class="" data-value="svelte" data-shortcut="⌘K">Svelte</div>
              <div data-component="menu-trigger-item" class="" data-value="frameworks">
                Frameworks
                <div data-component="menu-positioner-nested" class="">
                  <div data-component="menu-content" class="">
                    <div data-component="menu-item" class="" data-value="react">React</div>
                    <div data-component="menu-item" class="" data-value="solid">Solid</div>
                    <div data-component="menu-item" class="" data-value="vue">Vue</div>
                    <div data-component="menu-item" class="" data-value="svelte">Svelte</div>
                  </div>
                </div>
              </div>
              <hr data-component="menu-separator" class="" />
              <div data-component="menu-item" class="" data-value="react-disabled" data-disabled>React</div>
              <div data-component="menu-item" class="" data-value="solid2">Solid</div>
              <div data-component="menu-item" class="" data-value="vue2">Vue</div>
              <div data-component="menu-item" class="" data-value="svelte2" data-shortcut="⇧⌘Q">Svelte</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Col 5: checkbox items -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="menu-root" class=" w-56">
          <button data-component="menu-trigger" class="">Open menu</button>
          <div data-component="menu-positioner" class="">
            <div data-component="menu-content" class="">
              <div data-component="menu-item" class="" data-type="checkbox" data-value="react">React</div>
              <div data-component="menu-item" class="" data-type="checkbox" data-value="solid">Solid</div>
              <div data-component="menu-item" class="" data-type="checkbox" data-value="vue">Vue</div>
              <div data-component="menu-item" class="" data-type="checkbox" data-value="svelte">Svelte</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Col 6: radio items with group label -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="menu-root" class=" w-56">
          <button data-component="menu-trigger" class="">Open menu</button>
          <div data-component="menu-positioner" class="">
            <div data-component="menu-content" class="">
              <div data-component="menu-radio-group" class="">
                <label data-component="menu-group-label" class="">Frameworks</label>
                <div data-component="menu-item" class="" data-type="radio" data-value="React" data-checked>React</div>
                <div data-component="menu-item" class="" data-type="radio" data-value="Solid">Solid</div>
                <div data-component="menu-item" class="" data-type="radio" data-value="Vue">Vue</div>
                <div data-component="menu-item" class="" data-type="radio" data-value="Svelte">Svelte</div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
