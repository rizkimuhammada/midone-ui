<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart - Midone UI Vanilla</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="p-10">
  <div class="flex flex-col gap-20">
    <div class="grid grid-cols-2">
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <canvas class="chart max-w-100"
          data-type="bar"
          data-labels='["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]'
          data-dataset-label="Html Template"
          data-dataset-data="[60,150,30,200,180,50,180,120,230,180,250,270]"
          data-max-bar-thickness="12"
        ></canvas>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
