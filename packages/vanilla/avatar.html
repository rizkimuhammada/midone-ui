<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar - Midone UI</title>
</head>

<body class="p-10 bg-background text-foreground">
    <div id="app">
        <div class="p-5 sm:p-20">
            <div class="flex flex-col gap-20">
                <div class="grid grid-cols-2">
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-avatar-root>
                            <m-avatar-fallback>PA</m-avatar-fallback>
                            <m-avatar-image src="https://i.pravatar.cc/300" alt="avatar"></m-avatar-image>
                        </m-avatar-root>
                    </div>
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-avatar-root bordered="false">
                            <m-avatar-fallback>PA</m-avatar-fallback>
                            <m-avatar-image src="https://i.pravatar.cc/300" alt="avatar"></m-avatar-image>
                        </m-avatar-root>
                    </div>
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-avatar-root class="rounded-full">
                            <m-avatar-fallback>PA</m-avatar-fallback>
                            <m-avatar-image src="https://i.pravatar.cc/300" alt="avatar"></m-avatar-image>
                        </m-avatar-root>
                    </div>
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-avatar-root class="rounded-full" bordered="false">
                            <m-avatar-fallback>PA</m-avatar-fallback>
                            <m-avatar-image src="https://i.pravatar.cc/300" alt="avatar"></m-avatar-image>
                        </m-avatar-root>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
