<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combobox - Midone UI Vanilla</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body class="p-10">
  <div class="flex flex-col gap-20">
    <div class="grid grid-cols-2">

      <!-- Example 1: Single select (Shorthand Items) -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="combobox-root" class="w-56">
          <label data-component="combobox-label">Single</label>
          <div data-component="combobox-control">
            <button data-component="combobox-trigger"></button>
          </div>
          <div data-component="combobox-positioner">
            <div data-component="combobox-content">
              <input data-component="combobox-input" placeholder="Search frameworks..." />
              <div data-component="combobox-item-group">
                <label data-component="combobox-item-group-label">Frameworks</label>
                <div data-component="combobox-item" data-value="React"></div>
                <div data-component="combobox-item" data-value="Solid"></div>
                <div data-component="combobox-item" data-value="Vue"></div>
                <div data-component="combobox-item" data-value="Svelte"></div>
                <div data-component="combobox-item" data-value="Vanilla" data-text="Vanilla JS"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Example 2: Single select (Manual) -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="combobox-root" class="w-56">
          <label data-component="combobox-label">Single</label>
          <div data-component="combobox-control">
            <button data-component="combobox-trigger"></button>
          </div>
          <div data-component="combobox-positioner">
            <div data-component="combobox-content">
              <input data-component="combobox-input" placeholder="Search frameworks..." />
              <div data-component="combobox-item-group">
                <label data-component="combobox-item-group-label">Frameworks</label>
                <div data-component="combobox-item" data-value="React">
                  <div data-component="combobox-item-text">React</div>
                </div>
                <div data-component="combobox-item" data-value="Solid">
                  <div data-component="combobox-item-text">Solid</div>
                </div>
                <div data-component="combobox-item" data-value="Vue">
                  <div data-component="combobox-item-text">Vue</div>
                </div>
                <div data-component="combobox-item" data-value="Svelte">
                  <div data-component="combobox-item-text">Svelte</div>
                </div>
                <div data-component="combobox-item" data-value="Vanilla">
                  <div data-component="combobox-item-text">Vanilla JS</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Example 3: Multiple select -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="combobox-root" class="w-56" data-multiple="true">
          <label data-component="combobox-label">Multiple</label>
          <div data-component="combobox-control">
            <button data-component="combobox-trigger"></button>
          </div>
          <div data-component="combobox-positioner">
            <div data-component="combobox-content">
              <input data-component="combobox-input" placeholder="Search frameworks..." />
              <div data-component="combobox-item-group">
                <label data-component="combobox-item-group-label">Frameworks</label>
                <div data-component="combobox-item" data-value="React"></div>
                <div data-component="combobox-item" data-value="Solid"></div>
                <div data-component="combobox-item" data-value="Vue"></div>
                <div data-component="combobox-item" data-value="Svelte"></div>
                <div data-component="combobox-item" data-value="Vanilla" data-text="Vanilla JS"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Example 4: Scrollable multiple with grouped timezones -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="combobox-root" class="w-56" data-multiple="true">
          <label data-component="combobox-label">Scrollable</label>
          <div data-component="combobox-control">
            <button data-component="combobox-trigger"></button>
          </div>
          <div data-component="combobox-positioner">
            <div data-component="combobox-content">
              <input data-component="combobox-input" placeholder="Search region..." />
              <div data-component="combobox-item-group">
                <label data-component="combobox-item-group-label">North America</label>
                <div data-component="combobox-item" data-value="est" data-text="Eastern Standard Time (EST)"></div>
                <div data-component="combobox-item" data-value="cst" data-text="Central Standard Time (CST)"></div>
                <div data-component="combobox-item" data-value="mst" data-text="Mountain Standard Time (MST)"></div>
                <div data-component="combobox-item" data-value="pst" data-text="Pacific Standard Time (PST)"></div>
                <div data-component="combobox-item" data-value="akst" data-text="Alaska Standard Time (AKST)"></div>
                <div data-component="combobox-item" data-value="hst" data-text="Hawaii Standard Time (HST)"></div>
              </div>
              <div data-component="combobox-item-group">
                <label data-component="combobox-item-group-label">Europe & Africa</label>
                <div data-component="combobox-item" data-value="gmt" data-text="Greenwich Mean Time (GMT)"></div>
                <div data-component="combobox-item" data-value="cet" data-text="Central European Time (CET)"></div>
                <div data-component="combobox-item" data-value="eet" data-text="Eastern European Time (EET)"></div>
                <div data-component="combobox-item" data-value="west" data-text="Western European Summer Time (WEST)"></div>
                <div data-component="combobox-item" data-value="cat" data-text="Central Africa Time (CAT)"></div>
                <div data-component="combobox-item" data-value="eat" data-text="East Africa Time (EAT)"></div>
              </div>
              <div data-component="combobox-item-group">
                <label data-component="combobox-item-group-label">Asia</label>
                <div data-component="combobox-item" data-value="msk" data-text="Moscow Time (MSK)"></div>
                <div data-component="combobox-item" data-value="ist" data-text="India Standard Time (IST)"></div>
                <div data-component="combobox-item" data-value="cst_china" data-text="China Standard Time (CST)"></div>
                <div data-component="combobox-item" data-value="jst" data-text="Japan Standard Time (JST)"></div>
                <div data-component="combobox-item" data-value="kst" data-text="Korea Standard Time (KST)"></div>
                <div data-component="combobox-item" data-value="ist_indonesia" data-text="Indonesia Central Standard Time (WITA)"></div>
              </div>
              <div data-component="combobox-item-group">
                <label data-component="combobox-item-group-label">Australia & Pacific</label>
                <div data-component="combobox-item" data-value="awst" data-text="Australian Western Standard Time (AWST)"></div>
                <div data-component="combobox-item" data-value="acst" data-text="Australian Central Standard Time (ACST)"></div>
                <div data-component="combobox-item" data-value="aest" data-text="Australian Eastern Standard Time (AEST)"></div>
                <div data-component="combobox-item" data-value="nzst" data-text="New Zealand Standard Time (NZST)"></div>
                <div data-component="combobox-item" data-value="fjt" data-text="Fiji Time (FJT)"></div>
              </div>
              <div data-component="combobox-item-group">
                <label data-component="combobox-item-group-label">South America</label>
                <div data-component="combobox-item" data-value="art" data-text="Argentina Time (ART)"></div>
                <div data-component="combobox-item" data-value="bot" data-text="Bolivia Time (BOT)"></div>
                <div data-component="combobox-item" data-value="brt" data-text="Brasilia Time (BRT)"></div>
                <div data-component="combobox-item" data-value="clt" data-text="Chile Standard Time (CLT)"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
