<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Midone UI for Vanilla JS - A premium set of native web components built with Tailwind CSS. Highly customizable and easy to integrate." />
    <meta name="keywords" content="midone ui, vanilla js, web components, tailwind css, UI library, premium components" />
    <meta name="author" content="Left4code" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.midone-ui.com/vanilla" />
    <meta property="og:title" content="Midone UI - Vanilla JS Components" />
    <meta property="og:description" content="Midone UI for Vanilla JS - A premium set of native web components built with Tailwind CSS." />
    <meta property="og:image" content="/vite.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.midone-ui.com/vanilla" />
    <meta property="twitter:title" content="Midone UI - Vanilla JS Components" />
    <meta property="twitter:description" content="Midone UI for Vanilla JS - A premium set of native web components built with Tailwind CSS." />
    <meta property="twitter:image" content="/vite.svg" />
  <title>Slider - Midone UI Vanilla</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="flex flex-col gap-20">
    <div class="grid grid-cols-2">

      <!-- Example 1: Single Thumb -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div class="text-sm text-muted-foreground">
          <div data-component="slider-root" class="w-72" data-default-value="[20]" data-label="Max Items">
            <div class="flex items-center text-xs gap-1 font-medium justify-center opacity-70">
              <output data-component="slider-value-text"></output> Items
            </div>
          </div>
        </div>
      </div>

      <!-- Example 2: Range (Two Thumbs) -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div class="text-sm text-muted-foreground">
          <div data-component="slider-root" class="w-72" data-default-value="[20, 80]" data-label="Price Range" data-type="range">
            <div data-component="slider-marker-group">
              <div data-component="slider-marker" data-value="0">$0</div>
              <div data-component="slider-marker" data-value="25">$25</div>
              <div data-component="slider-marker" data-value="50">$50</div>
              <div data-component="slider-marker" data-value="75">$75</div>
              <div data-component="slider-marker" data-value="100">$100</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
