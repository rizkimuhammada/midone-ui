<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field - Midone UI Vanilla</title>
</head>
<body class="p-10">
  <div class="flex flex-col gap-20">
    <div class="grid sm:grid-cols-2">

      <!-- Example 1: Payment Method Form -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div class="w-full max-w-md">
          <form>
            <div class="field-group">
              <fieldset class="field-set">
                <legend class="field-legend">Payment Method</legend>
                <p class="field-description">All transactions are secure and encrypted</p>
                <div class="field-group">
                  <div class="field">
                    <label class="field-label" for="checkout-card-name">Name on Card</label>
                    <input class="input" id="checkout-card-name" placeholder="Evil Rabbit" required />
                  </div>
                  <div class="field">
                    <label class="field-label" for="checkout-card-number">Card Number</label>
                    <input class="input" id="checkout-card-number" placeholder="1234 5678 9012 3456" required />
                    <p class="field-description">Enter your 16-digit card number</p>
                  </div>
                  <div class="grid grid-cols-3 gap-4">
                    <div class="field">
                      <label class="field-label" for="checkout-exp-month">Month</label>
                      <div class="select-root">
                        <div class="select-control">
                          <button class="select-trigger">
                            <div class="select-value-text" data-placeholder="Month"></div>
                          </button>
                        </div>
                        <div class="select-content">
                          <div class="select-item-group">
                            <label class="select-item-group-label">Month</label>
                            <div class="select-item" data-value="01"><div class="select-item-text">01</div></div>
                            <div class="select-item" data-value="02"><div class="select-item-text">02</div></div>
                            <div class="select-item" data-value="03"><div class="select-item-text">03</div></div>
                            <div class="select-item" data-value="04"><div class="select-item-text">04</div></div>
                            <div class="select-item" data-value="05"><div class="select-item-text">05</div></div>
                            <div class="select-item" data-value="06"><div class="select-item-text">06</div></div>
                            <div class="select-item" data-value="07"><div class="select-item-text">07</div></div>
                            <div class="select-item" data-value="08"><div class="select-item-text">08</div></div>
                            <div class="select-item" data-value="09"><div class="select-item-text">09</div></div>
                            <div class="select-item" data-value="10"><div class="select-item-text">10</div></div>
                            <div class="select-item" data-value="11"><div class="select-item-text">11</div></div>
                            <div class="select-item" data-value="12"><div class="select-item-text">12</div></div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="field">
                      <label class="field-label" for="checkout-exp-year">Year</label>
                      <div class="select-root">
                        <div class="select-control">
                          <button class="select-trigger">
                            <div class="select-value-text" data-placeholder="Year"></div>
                          </button>
                        </div>
                        <div class="select-content">
                          <div class="select-item-group">
                            <label class="select-item-group-label">Year</label>
                            <div class="select-item" data-value="2025"><div class="select-item-text">2025</div></div>
                            <div class="select-item" data-value="2026"><div class="select-item-text">2026</div></div>
                            <div class="select-item" data-value="2027"><div class="select-item-text">2027</div></div>
                            <div class="select-item" data-value="2028"><div class="select-item-text">2028</div></div>
                            <div class="select-item" data-value="2029"><div class="select-item-text">2029</div></div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="field">
                      <label class="field-label" for="checkout-cvv">CVV</label>
                      <input class="input" id="checkout-cvv" placeholder="123" required />
                    </div>
                  </div>
                </div>
              </fieldset>
              <div class="field-separator"></div>
              <fieldset class="field-set">
                <legend class="field-legend">Billing Address</legend>
                <p class="field-description">The billing address associated with your payment method</p>
                <label class="checkbox-root">
                  <span class="checkbox-control"></span>
                  <span class="checkbox-label font-normal">Same as shipping address</span>
                </label>
              </fieldset>
              <fieldset class="field-set">
                <div class="field-group">
                  <div class="field">
                    <label class="field-label" for="checkout-comments">Comments</label>
                    <textarea class="textarea resize-none" id="checkout-comments" placeholder="Add any additional comments"></textarea>
                  </div>
                </div>
              </fieldset>
              <div class="field" data-orientation="horizontal">
                <button class="button" data-look="outline" type="submit">Submit</button>
                <button class="button" type="button">Cancel</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Example 2: Compute Environment (RadioGroup in FieldLabel) -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div class="field-group w-full max-w-xs">
          <fieldset class="field-set">
            <legend class="field-legend" data-variant="label">Compute Environment</legend>
            <p class="field-description">Select the compute environment for your cluster.</p>
            <div class="radio-group-root" data-default-value="React">
              <label class="field-label">
                <div class="field" data-orientation="horizontal">
                  <div class="field-content">
                    <div class="field-title">Kubernetes</div>
                    <p class="field-description">Run GPU workloads on a K8s cluster.</p>
                  </div>
                  <div class="radio-group-item" data-value="React">
                    <div class="radio-group-item-control"></div>
                  </div>
                </div>
              </label>
              <label class="field-label">
                <div class="field" data-orientation="horizontal">
                  <div class="field-content">
                    <div class="field-title">Virtual Machine</div>
                    <p class="field-description">Access a cluster to run GPU workloads.</p>
                  </div>
                  <div class="radio-group-item" data-value="Solid">
                    <div class="radio-group-item-control"></div>
                  </div>
                </div>
              </label>
            </div>
          </fieldset>
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
