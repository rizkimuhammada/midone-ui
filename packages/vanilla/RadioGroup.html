<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Midone UI for Vanilla JS - A premium set of native web components built with Tailwind CSS. Highly customizable and easy to integrate." />
    <meta name="keywords" content="midone ui, vanilla js, web components, tailwind css, UI library, premium components" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.midone-ui.com/vanilla" />
    <meta property="og:title" content="Midone UI - Vanilla JS Components" />
    <meta property="og:description" content="Midone UI for Vanilla JS - A premium set of native web components built with Tailwind CSS." />
    <meta property="og:image" content="/vite.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.midone-ui.com/vanilla" />
    <meta property="twitter:title" content="Midone UI - Vanilla JS Components" />
    <meta property="twitter:description" content="Midone UI for Vanilla JS - A premium set of native web components built with Tailwind CSS." />
    <meta property="twitter:image" content="/vite.svg" />
  <title>RadioGroup - Midone UI Vanilla</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div class="flex flex-col gap-20">
    <div class="grid grid-cols-2">
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="radio-group-root" data-default-value="React" data-label="Framework">
          <div data-component="radio-group-item" data-value="React">React</div>
          <div data-component="radio-group-item" data-value="Solid">Solid</div>
          <div data-component="radio-group-item" data-value="Vue">Vue</div>
          <div data-component="radio-group-item" data-value="Svelte">Svelte</div>
        </div>
      </div>
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="radio-group-root" data-default-value="required">
          <div data-component="radio-group-item" data-value="required">
            <div class="font-medium">Required</div>
            <div class="mt-1 text-xs leading-relaxed opacity-70">
              You require the buyer to activate shipping insurance
            </div>
          </div>
          <div data-component="radio-group-item" data-value="optional">
            <div class="font-medium">Optional</div>
            <div class="mt-1 text-xs leading-relaxed opacity-70">
              You give the buyer the option to activate shipping insurance
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
