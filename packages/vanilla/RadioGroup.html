<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RadioGroup - Midone UI Vanilla</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="p-10">
  <div data-component="radio-group-root" data-default-value="React">
    <span data-component="radio-group-label">Framework</span>
    <div data-component="radio-group-item" data-value="React">
      <div data-component="radio-group-item-control"></div>
      <span data-component="radio-group-item-text">React</span>
    </div>
    <div data-component="radio-group-item" data-value="Solid">
      <div data-component="radio-group-item-control"></div>
      <span data-component="radio-group-item-text">Solid</span>
    </div>
    <div data-component="radio-group-item" data-value="Vue">
      <div data-component="radio-group-item-control"></div>
      <span data-component="radio-group-item-text">Vue</span>
    </div>
    <div data-component="radio-group-item" data-value="Svelte">
      <div data-component="radio-group-item-control"></div>
      <span data-component="radio-group-item-text">Svelte</span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
