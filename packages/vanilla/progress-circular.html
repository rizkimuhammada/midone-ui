<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Circular - Midone UI</title>
</head>

<body class="p-10 bg-background text-foreground">
    <div id="app">
        <div class="p-5 sm:p-20">
            <div class="flex flex-col gap-20">
                <div class="grid grid-cols-2">
                    <div
                        class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
                        <m-progress-circular-root value="42">
                            <m-progress-label>Progress Circular</m-progress-label>
                            <m-progress-circular-circle class="max-w-48">
                                <m-progress-circular-track></m-progress-circular-track>
                                <m-progress-circular-range></m-progress-circular-range>
                            </m-progress-circular-circle>
                            <m-progress-value-text></m-progress-value-text>
                        </m-progress-circular-root>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
