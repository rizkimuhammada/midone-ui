<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datepicker - Midone UI Vanilla</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body class="p-10">
  <div class="flex flex-col gap-20">
    <div class="grid grid-cols-2">

      <!-- Example 1: Basic -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="datepicker-root" class=" w-84">
          <label data-component="datepicker-label" class="label">Basic</label>
          <div data-component="datepicker-control" class="">
            <input type="text" data-component="datepicker-input" class="input">
            <button data-component="datepicker-trigger" class=""></button>
            <button data-component="datepicker-clear-trigger" class="">Clear</button>
          </div>
          <div data-component="datepicker-positioner" class="">
            <div data-component="datepicker-content" class="" data-raised="single">
                <select data-component="datepicker-year-select" class=""></select>
                <select data-component="datepicker-month-select" class=""></select>
                <div data-component="datepicker-view" class="" data-view="day">
                  <div data-component="datepicker-view" class="-control">
                    <button data-component="datepicker-prev-trigger" class=""></button>
                    <button data-component="datepicker-view" class="-trigger">
                      <div data-component="datepicker-range-text" class=""></div>
                    </button>
                    <button data-component="datepicker-next-trigger" class=""></button>
                  </div>
                  <table data-component="datepicker-table" class="">
                    <thead data-component="datepicker-table" class="-head">
                      <tr data-component="datepicker-table" class="-row"></tr>
                    </thead>
                    <tbody data-component="datepicker-table" class="-body"></tbody>
                  </table>
                </div>
                <div data-component="datepicker-view" class="" data-view="month">
                  <div data-component="datepicker-view" class="-control">
                    <button data-component="datepicker-prev-trigger" class=""></button>
                    <button data-component="datepicker-view" class="-trigger">
                      <div data-component="datepicker-range-text" class=""></div>
                    </button>
                    <button data-component="datepicker-next-trigger" class=""></button>
                  </div>
                  <table data-component="datepicker-table" class="">
                    <tbody data-component="datepicker-table" class="-body"></tbody>
                  </table>
                </div>
                <div data-component="datepicker-view" class="" data-view="year">
                  <div data-component="datepicker-view" class="-control">
                    <button data-component="datepicker-prev-trigger" class=""></button>
                    <button data-component="datepicker-view" class="-trigger">
                      <div data-component="datepicker-range-text" class=""></div>
                    </button>
                    <button data-component="datepicker-next-trigger" class=""></button>
                  </div>
                  <table data-component="datepicker-table" class="">
                    <tbody data-component="datepicker-table" class="-body"></tbody>
                  </table>
                </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Example 2: Range Selection -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="datepicker-root" class=" w-140" data-selection-mode="range">
          <label data-component="datepicker-label" class="label">Range Selection</label>
          <div data-component="datepicker-control" class="">
            <input type="text" data-component="datepicker-input" class="input" data-index="0">
            <input type="text" data-component="datepicker-input" class="input" data-index="1">
            <button data-component="datepicker-trigger" class=""></button>
            <button data-component="datepicker-clear-trigger" class="">Clear</button>
          </div>
          <div class="flex gap-1">
            <button data-component="datepicker-preset-trigger" class=" badge" data-value="thisWeek" data-variant="secondary"
              data-look="outline">This Week</button>
            <button data-component="datepicker-preset-trigger" class=" badge" data-value="lastWeek" data-variant="secondary"
              data-look="outline">Last Week</button>
            <button data-component="datepicker-preset-trigger" class=" badge" data-value="thisMonth" data-variant="secondary"
              data-look="outline">This Month</button>
          </div>
          <div data-component="datepicker-positioner" class="">
            <div data-component="datepicker-content" class="" data-raised="single">
                <select data-component="datepicker-year-select" class=""></select>
                <select data-component="datepicker-month-select" class=""></select>
                <div data-component="datepicker-view" class="" data-view="day">
                  <div data-component="datepicker-view" class="-control">
                    <button data-component="datepicker-prev-trigger" class=""></button>
                    <button data-component="datepicker-view" class="-trigger">
                      <div data-component="datepicker-range-text" class=""></div>
                    </button>
                    <button data-component="datepicker-next-trigger" class=""></button>
                  </div>
                  <table data-component="datepicker-table" class="">
                    <thead data-component="datepicker-table" class="-head">
                      <tr data-component="datepicker-table" class="-row"></tr>
                    </thead>
                    <tbody data-component="datepicker-table" class="-body"></tbody>
                  </table>
                </div>
                <div data-component="datepicker-view" class="" data-view="month">
                  <div data-component="datepicker-view" class="-control">
                    <button data-component="datepicker-prev-trigger" class=""></button>
                    <button data-component="datepicker-view" class="-trigger">
                      <div data-component="datepicker-range-text" class=""></div>
                    </button>
                    <button data-component="datepicker-next-trigger" class=""></button>
                  </div>
                  <table data-component="datepicker-table" class="">
                    <tbody data-component="datepicker-table" class="-body"></tbody>
                  </table>
                </div>
                <div data-component="datepicker-view" class="" data-view="year">
                  <div data-component="datepicker-view" class="-control">
                    <button data-component="datepicker-prev-trigger" class=""></button>
                    <button data-component="datepicker-view" class="-trigger">
                      <div data-component="datepicker-range-text" class=""></div>
                    </button>
                    <button data-component="datepicker-next-trigger" class=""></button>
                  </div>
                  <table data-component="datepicker-table" class="">
                    <tbody data-component="datepicker-table" class="-body"></tbody>
                  </table>
                </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Example 3: Multiple Months -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="datepicker-root" class=" w-84" data-num-of-months="2">
          <label data-component="datepicker-label" class="label">Multiple Months</label>
          <div data-component="datepicker-control" class="">
            <input type="text" data-component="datepicker-input" class="input" data-index="0">
            <button data-component="datepicker-trigger" class=""></button>
            <button data-component="datepicker-clear-trigger" class="">Clear</button>
          </div>
          <div data-component="datepicker-positioner" class="">
            <div data-component="datepicker-content" class="" data-raised="single">
                <select data-component="datepicker-year-select" class=""></select>
                <select data-component="datepicker-month-select" class=""></select>
                <div data-component="datepicker-view" class="-control">
                  <button data-component="datepicker-prev-trigger" class=""></button>
                  <div data-component="datepicker-range-text" class=""></div>
                  <button data-component="datepicker-next-trigger" class=""></button>
                </div>
                <div data-component="datepicker-view" class=" flex-row" data-view="day">
                  <table data-component="datepicker-table" class="" data-month-offset="0">
                    <thead data-component="datepicker-table" class="-head">
                      <tr data-component="datepicker-table" class="-row"></tr>
                    </thead>
                    <tbody data-component="datepicker-table" class="-body"></tbody>
                  </table>
                  <table data-component="datepicker-table" class="" data-month-offset="1">
                    <thead data-component="datepicker-table" class="-head">
                      <tr data-component="datepicker-table" class="-row"></tr>
                    </thead>
                    <tbody data-component="datepicker-table" class="-body"></tbody>
                  </table>
                </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Example 4: Inline/Open -->
      <div class="justify-center items-center flex gap-2 border-b border-e border-foreground/10 p-5 flex-wrap">
        <div data-component="datepicker-root" class="" data-open>
          <input type="text" data-component="datepicker-input" class="input w-84 mx-auto">
          <div class="box mx-auto" data-raised="single">
            <div data-component="datepicker-view" class="" data-view="day">
              <div data-component="datepicker-view" class="-control">
                <button data-component="datepicker-prev-trigger" class=""></button>
                <button data-component="datepicker-view" class="-trigger">
                  <div data-component="datepicker-range-text" class=""></div>
                </button>
                <button data-component="datepicker-next-trigger" class=""></button>
              </div>
              <table data-component="datepicker-table" class="">
                <thead data-component="datepicker-table" class="-head">
                  <tr data-component="datepicker-table" class="-row"></tr>
                </thead>
                <tbody data-component="datepicker-table" class="-body"></tbody>
              </table>
            </div>
            <div data-component="datepicker-view" class="" data-view="month">
              <div data-component="datepicker-view" class="-control">
                <button data-component="datepicker-prev-trigger" class=""></button>
                <button data-component="datepicker-view" class="-trigger">
                  <div data-component="datepicker-range-text" class=""></div>
                </button>
                <button data-component="datepicker-next-trigger" class=""></button>
              </div>
              <table data-component="datepicker-table" class="">
                <tbody data-component="datepicker-table" class="-body"></tbody>
              </table>
            </div>
            <div data-component="datepicker-view" class="" data-view="year">
              <div data-component="datepicker-view" class="-control">
                <button data-component="datepicker-prev-trigger" class=""></button>
                <button data-component="datepicker-view" class="-trigger">
                  <div data-component="datepicker-range-text" class=""></div>
                </button>
                <button data-component="datepicker-next-trigger" class=""></button>
              </div>
              <table data-component="datepicker-table" class="">
                <tbody data-component="datepicker-table" class="-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
